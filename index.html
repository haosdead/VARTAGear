<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VARTA GEAR | Tactical Store</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="body-overlay" onclick="closeAllPanels()"></div>

<header class="header">
    <div class="header-inner">
        <button class="nav-icon" onclick="toggleMobileMenu(true)"><i class="fas fa-bars"></i></button>
        <div class="brand">VARTA GEAR</div>
        <button class="nav-icon" onclick="toggleCart(true)">
            <i class="fas fa-shopping-bag"></i>
            <span id="cart-count">0</span>
        </button>
    </div>
</header>

<aside id="mobile-menu" class="side-panel">
    <div class="panel-header">
        <h3>КАТЕГОРІЇ</h3>
        <button class="close-btn" onclick="toggleMobileMenu(false)">✕</button>
    </div>
    
    <div class="search-container">
        <input type="text" id="search" placeholder="Пошук товару..." oninput="resetPageAndFilter()">
    </div>

    <nav id="category-tree" class="category-tree">
        </nav>
    
    <button class="reset-filters-btn" onclick="resetFilters()">Показати всі товари</button>
</aside>

<main class="main-container">
    <div class="quick-filters">
        <button class="filter-tag active" onclick="filterByBadge('all', this)">Всі</button>
        <button class="filter-tag sale" onclick="filterByBadge('SALE', this)">🔥 SALE</button>
        <button class="filter-tag top" onclick="filterByBadge('TOP', this)">⭐ ТОП</button>
    </div>

    <div id="catalog" class="products-grid"></div>
    
    <div id="pagination" class="pagination-bar"></div>
</main>

<aside id="cart-sidebar" class="side-panel right">
    <div class="panel-header">
        <h3>КОШИК</h3>
        <button class="close-btn" onclick="toggleCart(false)">✕</button>
    </div>
    <div id="cart-content" class="cart-items-list"></div>
    <div id="cart-footer" class="cart-bottom" style="display:none;">
        <div class="cart-sum">Разом: <span id="cart-total-price">0</span> грн</div>
        <div class="checkout-inputs">
            <input type="text" id="cust-name" placeholder="Ваше ПІБ">
            <input type="tel" id="cust-phone" placeholder="Номер телефону">
            <input type="text" id="cust-city" placeholder="Місто">
            <input type="text" id="cust-post" placeholder="Відділення Нової Пошти">
        </div>
        <button class="checkout-btn" onclick="checkout('tg')">ЗАМОВИТИ У TELEGRAM</button>
    </div>
</aside>

<div id="product-modal" class="modal">
    <div class="modal-card">
        <button class="modal-close-top" onclick="closeModal()">✕</button>
        <div class="modal-body">
            <div class="modal-visuals">
                <div class="modal-main-frame">
                    <img id="modal-main-img" src="" alt="">
                </div>
                <div id="modal-thumbnails" class="modal-thumbs-row"></div>
            </div>
            <div class="modal-text-info">
                <h2 id="modal-name"></h2>
                <div class="modal-prices">
                    <span id="modal-old-price" class="price-old"></span>
                    <span id="modal-price" class="price-new"></span>
                </div>
                <div id="modal-desc" class="product-description"></div>
                
                <div class="modal-order-block">
                    <label>Оберіть розмір:</label>
                    <select id="modal-size-selector" class="size-dropdown"></select>
                    <button id="modal-add-btn" class="add-to-cart-btn">ДОДАТИ В КОШИК</button>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="main-footer">
    <div class="footer-trust">
        <div class="trust-box"><i class="fas fa-undo"></i> <span>Легкий обмін</span></div>
        <div class="trust-box"><i class="fas fa-shield-alt"></i> <span>Післяплата</span></div>
    </div>
    <p>© 2026 VARTA GEAR. Слава Україні!</p>
</footer>

<script src="script.js"></script>
</body>
</html>
