<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VARTA GEAR | Екіпірування</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="nav-container">
        <div class="logo">VARTA <span class="accent-text">GEAR</span></div>
        <div onclick="toggleCart()" class="cart-trigger">
            <i class="fas fa-shopping-cart"></i> <span id="cart-count">0</span>
        </div>
    </div>
</header>

<div class="main-container">
    <div class="filters">
        <input type="text" id="search" placeholder="Пошук (назва, опис, колір)..." oninput="resetPageAndFilter()">
        <select id="filter-cat" onchange="resetPageAndFilter()">
            <option value="">Усі категорії</option>
        </select>
        <select id="filter-subcat" onchange="resetPageAndFilter()" disabled>
            <option value="">Усі підкатегорії</option>
        </select>
    </div>

    <div class="catalog" id="catalog">
        </div>

    <div class="pagination" id="pagination">
        </div>
</div>

<div id="cart-sidebar">
    <div class="cart-header">
        <h3>Кошик</h3>
        <span onclick="toggleCart()" class="close-cart">✕</span>
    </div>
    <div id="cart-content">Порожньо</div>
    <div class="cart-footer" id="cart-footer" style="display:none;">
        <div class="cart-total">Разом: <span id="cart-total-price">0</span> грн</div>
        <div class="order-btns">
            <button class="btn-tg" onclick="checkout('tg')"><i class="fab fa-telegram"></i> Telegram</button>
            <button class="btn-wa" onclick="checkout('wa')"><i class="fab fa-whatsapp"></i> WhatsApp</button>
        </div>
    </div>
</div>

<div id="product-modal" class="modal">
    <div class="modal-content">
        <span onclick="closeModal()" class="close-modal">✕</span>
        <div class="modal-grid">
            <div class="modal-gallery">
                <div class="swiper-container">
                    <img id="modal-main-img" src="" alt="">
                    <button class="prev-pic" onclick="changeModalPic(-1)">❮</button>
                    <button class="next-pic" onclick="changeModalPic(1)">❯</button>
                </div>
                <div id="modal-thumbnails" class="thumbnails"></div>
            </div>
            <div class="modal-info">
                <div id="modal-subcat" class="subcat-label"></div>
                <h2 id="modal-name"></h2>
                <div class="modal-price-block">
                    <span id="modal-old-price" class="old-price"></span>
                    <span id="modal-price" class="price"></span>
                </div>
                <p id="modal-desc"></p>
                <div id="modal-vendor" class="vendor-code"></div>
                
                <div class="action-block">
                    <select id="modal-size-selector" class="size-selector">
                        <option value="">Оберіть розмір</option>
                    </select>
                    <button id="modal-add-btn" class="btn-buy" onclick="">До кошика</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
