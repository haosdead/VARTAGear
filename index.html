<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VARTA GEAR | Tactical Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="body-overlay" onclick="closeAllPanels()"></div>

<header class="header">
    <div class="header-inner">
        <button class="nav-icon" onclick="toggleMobileMenu(true)"><i class="fas fa-bars"></i></button>
        <div class="logo">VARTA <span class="accent-text">GEAR</span></div>
        <button class="nav-icon" onclick="toggleCart(true)">
            <i class="fas fa-shopping-bag"></i>
            <span id="cart-count">0</span>
        </button>
    </div>
</header>

<aside id="mobile-menu" class="side-panel">
    <div class="panel-header">
        <h3>КАТЕГОРІЇ</h3>
        <button class="close-btn" onclick="toggleMobileMenu(false)">✕</button>
    </div>
    <div class="search-container">
        <input type="text" id="search-input" placeholder="Пошук (назва, арт)..." oninput="resetPageAndFilter()">
    </div>
    <nav id="category-tree" class="category-tree"></nav>
    <button class="reset-filters-btn" onclick="resetFilters()">Скинути все</button>
</aside>

<main class="main-container">
    <div class="quick-filters">
        <button class="filter-tag active" onclick="filterByBadge('all', this)">Всі</button>
        <button class="filter-tag sale-tag-btn" onclick="filterByBadge('SALE', this)">🔥 SALE</button>
        <button class="filter-tag top-tag-btn" onclick="filterByBadge('TOP', this)">⭐ ТОП</button>
    </div>

    <div id="catalog" class="products-grid"></div>
    <div id="pagination" class="pagination-bar"></div>
</main>

<aside id="cart-sidebar" class="side-panel right">
    <div class="panel-header"><h3>КОШИК</h3><button class="close-btn" onclick="toggleCart(false)">✕</button></div>
    <div id="cart-content" class="cart-items-list"></div>
    <div id="cart-footer" class="cart-bottom" style="display:none;">
        <div class="cart-sum">Разом: <span id="cart-total-price">0</span> грн</div>
        <div class="checkout-btns">
            <button class="btn-tg" onclick="checkout('tg')"><i class="fab fa-telegram"></i> Telegram</button>
            <button class="btn-wa" onclick="checkout('wa')"><i class="fab fa-whatsapp"></i> WhatsApp</button>
        </div>
    </div>
</aside>

<div id="product-modal" class="modal">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-name"></h2>
                <span class="close-modal" onclick="closeModal()">✕</span>
            </div>
            <div class="modal-body-top">
                <div class="modal-photo-container">
                    <button class="nav-pic prev" onclick="changeModalPic(-1)">❮</button>
                    <img id="modal-main-img" src="" alt="">
                    <button class="nav-pic next" onclick="changeModalPic(1)">❯</button>
                </div>
                <div class="modal-actions-area">
                    <div id="modal-thumbnails" class="thumb-list"></div>
                    <div class="modal-price-block">
                        <span id="modal-old-price" class="old-price"></span>
                        <span id="modal-price" class="current-price"></span>
                    </div>
                    <div class="selector-block">
                        <label>Розмір:</label>
                        <select id="modal-size-selector" class="size-dropdown"></select>
                    </div>
                    <button id="modal-add-btn" class="add-to-cart-btn">ДОДАТИ В КОШИК</button>
                </div>
            </div>
            <div class="modal-description-bottom">
                <h3>Опис та характеристики</h3>
                <div id="modal-desc"></div>
                <div id="modal-vendor" class="vendor-label"></div>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
