<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tactical Store | Екіпірування</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --olive: #556b2f;
            --dark-olive: #3b4a20;
            --khaki: #bdb76b;
            --black: #1a1a1a;
            --gray: #2c2c2c;
            --white: #f5f5f5;
            --accent: #8b4513; /* Coyote brown */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }

        body {
            background-color: var(--black);
            color: var(--white);
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        /* Header & Navigation */
        header {
            background: var(--dark-olive);
            padding: 1rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border-bottom: 2px solid var(--olive);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-weight: bold; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; }

        /* Search & Filters */
        .filters {
            max-width: 1200px;
            margin: 1rem auto;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
        }

        input, select {
            padding: 12px;
            background: var(--gray);
            border: 1px solid var(--olive);
            color: white;
            border-radius: 4px;
            outline: none;
        }

        input:focus { border-color: var(--khaki); }

        /* Catalog Grid */
        .catalog {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: var(--gray);
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s;
            border: 1px solid #444;
            display: flex;
            flex-direction: column;
        }

        .card:hover { transform: translateY(-5px); border-color: var(--olive); }

        .card-img-container {
            width: 100%;
            height: 250px;
            background: #000;
            position: relative;
            cursor: pointer;
        }

        .card img { width: 100%; height: 100%; object-fit: cover; }

        .card-body { padding: 15px; flex-grow: 1; }
        .price { color: var(--khaki); font-size: 1.25rem; font-weight: bold; margin: 10px 0; }
        .old-price { text-decoration: line-through; color: #888; font-size: 0.9rem; margin-right: 10px; }

        .size-selector { margin-top: 10px; width: 100%; }

        .btn-buy {
            background: var(--olive);
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            margin-top: 15px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-buy:hover { background: var(--dark-olive); }

        /* Cart Sidebar */
        #cart-sidebar {
            position: fixed;
            right: -100%;
            top: 0;
            width: 350px;
            height: 100%;
            background: var(--gray);
            z-index: 2000;
            transition: 0.4s;
            padding: 20px;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            border-left: 2px solid var(--olive);
        }

        #cart-sidebar.active { right: 0; }

        .cart-item { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #444; }

        .order-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn-tg { background: #0088cc; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 4px; }
        .btn-wa { background: #25d366; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 4px; }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            #cart-sidebar { width: 100%; }
            .logo { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="nav-container">
        <div class="logo"><i class="fas fa-shield-alt"></i> Tactical Force</div>
        <div onclick="toggleCart()" style="cursor: pointer;">
            <i class="fas fa-shopping-cart"></i> <span id="cart-count">0</span>
        </div>
    </div>
</header>

<div class="filters">
    <input type="text" id="search" placeholder="Пошук товару..." oninput="filterItems()">
    <select id="filter-color" onchange="filterItems()">
        <option value="">Колір: Всі</option>
        <option value="мультикам">Мультикам</option>
        <option value="олива">Олива / Olive</option>
        <option value="піксель">Піксель / Pixel</option>
        <option value="чорний">Чорний / Black</option>
        <option value="синій">Синій / Blue</option>
        <option value="койот">Койот / Coyote</option>
    </select>
    <select id="filter-cat" onchange="filterItems()">
        <option value="">Категорія: Всі</option>
    </select>
</div>

<div class="catalog" id="catalog">
    </div>

<div id="cart-sidebar">
    <h3>Кошик</h3>
    <div id="cart-content">Порожньо</div>
    <div class="order-btns">
        <button class="btn-tg" onclick="checkout('tg')"><i class="fab fa-telegram"></i> Telegram</button>
        <button class="btn-wa" onclick="checkout('wa')"><i class="fab fa-whatsapp"></i> WhatsApp</button>
    </div>
    <button onclick="toggleCart()" style="margin-top: 20px; background: none; color: #888; border: none; cursor: pointer;">Закрити</button>
</div>

<script>
    let products = [];
    let cart = [];
    const CSV_URL = 'data.csv'; // ПЕРЕВІРТЕ НАЗВУ ФАЙЛУ!

    // Завантаження CSV
    Papa.parse(CSV_URL, {
        download: true,
        header: true,
        complete: function(results) {
            products = results.data.filter(p => p.Name);
            populateCategories();
            renderCatalog(products);
        }
    });

    function populateCategories() {
        const cats = [...new Set(products.map(p => p.Category))];
        const select = document.getElementById('filter-cat');
        cats.forEach(c => {
            let opt = document.createElement('option');
            opt.value = c;
            opt.innerText = c;
            select.appendChild(opt);
        });
    }

    function renderCatalog(items) {
        const container = document.getElementById('catalog');
        container.innerHTML = '';
        
        items.forEach((item, index) => {
            const pics = item.Pictures ? item.Pictures.split(',') : [];
            const sizes = item.Sizes ? item.Sizes.split(',') : [];
            const mainPic = pics[0] || 'https://via.placeholder.com/300x300?text=No+Photo';

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-img-container" onclick="openGallery('${item.Pictures}')">
                    <img src="${mainPic.trim()}" alt="${item.Name}">
                </div>
                <div class="card-body">
                    <div style="font-size: 0.8rem; color: var(--khaki);">${item.SubCategory}</div>
                    <h4 style="margin: 5px 0;">${item.Name}</h4>
                    <div class="price">
                        ${item.OldPrice ? `<span class="old-price">${item.OldPrice} грн</span>` : ''}
                        ${item.Price} грн
                    </div>
                    <select class="size-selector" id="size-${index}">
                        <option value="">Оберіть розмір</option>
                        ${sizes.map(s => `<option value="${s.trim()}">${s.trim()}</option>`).join('')}
                    </select>
                    <button class="btn-buy" onclick="addToCart(${index})">До кошика</button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function filterItems() {
        const q = document.getElementById('search').value.toLowerCase();
        const color = document.getElementById('filter-color').value.toLowerCase();
        const cat = document.getElementById('filter-cat').value;

        const filtered = products.filter(p => {
            const matchName = p.Name.toLowerCase().includes(q) || p.Description.toLowerCase().includes(q);
            const matchColor = color === "" || p.Name.toLowerCase().includes(color) || p.Description.toLowerCase().includes(color);
            const matchCat = cat === "" || p.Category === cat;
            return matchName && matchColor && matchCat;
        });
        renderCatalog(filtered);
    }

    function addToCart(idx) {
        const size = document.getElementById(`size-${idx}`).value;
        if(!size) { alert('Будь ласка, оберіть розмір!'); return; }
        
        const item = products[idx];
        cart.push({ name: item.Name, price: item.Price, size: size });
        updateCartUI();
        toggleCart(true);
    }

    function updateCartUI() {
        document.getElementById('cart-count').innerText = cart.length;
        const content = document.getElementById('cart-content');
        if(cart.length === 0) { content.innerText = 'Порожньо'; return; }
        
        content.innerHTML = cart.map((it, i) => `
            <div class="cart-item">
                <b>${it.name}</b><br>
                Розмір: ${it.size} | Ціна: ${it.price} грн
                <span onclick="removeFromCart(${i})" style="color:red; cursor:pointer; float:right;">✕</span>
            </div>
        `).join('');
    }

    function removeFromCart(i) {
        cart.splice(i, 1);
        updateCartUI();
    }

    function toggleCart(show = null) {
        const sidebar = document.getElementById('cart-sidebar');
        if(show === true) sidebar.classList.add('active');
        else if(show === false) sidebar.classList.remove('active');
        else sidebar.classList.toggle('active');
    }

    function checkout(platform) {
        if(cart.length === 0) return;
        
        let text = "Нове замовлення:\n";
        let total = 0;
        cart.forEach(it => {
            text += `- ${it.name} (Розмір: ${it.size}) - ${it.price} грн\n`;
            total += parseFloat(it.price);
        });
        text += `\nВсього: ${total} грн`;
        
        const encoded = encodeURIComponent(text);
        if(platform === 'tg') {
            window.open(`https://t.me/vartagear?text=${encoded}`); // ВПИШІТЬ СВІЙ ЮЗЕРНЕЙМ
        } else {
            window.open(`https://wa.me/+380933923810?text=${encoded}`); // ВПИШІТЬ СВІЙ НОМЕР
        }
    }

    function openGallery(picsStr) {
        const pics = picsStr.split(',');
        window.open(pics[0].trim(), '_blank'); // Спрощене відкриття. Можна додати модальне вікно.
    }
</script>

</body>
</html>
