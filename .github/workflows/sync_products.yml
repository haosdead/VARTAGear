name: Sync Products from Google Sheets

on:
  schedule:
    - cron: '0 */12 * * *' # Запускається кожні 12 годин
  workflow_dispatch: # Дозволяє запустити синхронізацію вручну кнопкою в GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Перевірка репозиторію
        uses: actions/checkout@v4

      - name: Налаштування Node.js
        uses: actions/setup-node@v4
        with:
          node-size: 20

      - name: Встановлення залежностей
        run: npm install axios csv-parse

      - name: Запуск скрипта генерації файлів
        run: node generate_feeds.js
        env:
          SHEET_CSV_URL: "ВАШЕ_ПОСИЛАННЯ_НА_CSV_З_КРОКУ_1"

      - name: Комміт та Пуш оновлених файлів
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.csv sitemap.xml merchant.xml
          git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 Авто-оновлення sitemap та merchant фідів" && git push)
